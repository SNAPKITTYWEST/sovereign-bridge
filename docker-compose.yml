services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sovereignsuite
      POSTGRES_USER: sovereign_app
      POSTGRES_PASSWORD: sovereign
    ports:
      - "5432:5432"
    volumes:
      - sovereignbridge_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sovereign
      MINIO_ROOT_PASSWORD: sovereignbridge
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sovereignbridge_minio:/data

volumes:
  sovereignbridge_pg:
  sovereignbridge_minio:
